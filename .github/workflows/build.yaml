name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils-mips-linux-gnu gcc-mips-linux-gnu ninja-build

      - name: Install wibo
        run: |
          curl -fsSL -o /usr/local/bin/wibo https://github.com/decompals/wibo/releases/download/0.6.16/wibo
          chmod +x /usr/local/bin/wibo

      - name: Download SN compilers
        run: ./setup

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download baserom
        run: uvx gdown "1uHBHOf55O5djjhuMfObCIivXRRy4YnH-" -O baserom.z64

      - name: Configure and build (NTSC)
        run: |
          uv run python configure.py --clean
          ninja

      - name: Verify checksum
        run: sha1sum -c checksum.sha1

      - name: Generate progress report
        run: uv run python3 -m mapfile_parser objdiff_report

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: ntsc_report
          path: report.json
